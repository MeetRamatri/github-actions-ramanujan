name: Actions
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:  
  default:
    working-directory: backend
  build:
    runs-on: ubuntu-latest
    default:
      working-directory: backend
    steps:
    - uses: actions/checkout@v2 
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16.x'
    - name: Install dependencies
      run: npm install
    - name: Build
      run: npm run build  
    - name: Run tests
      run: npm test